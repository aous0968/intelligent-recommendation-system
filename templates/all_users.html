<!DOCTYPE html>
<html>
<head>
    <title>All Users</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'recommender/style.css' %}">
</head>
<body style="padding-inline-start: 5px;">

<h1>All Users ({{ total }})</h1>

<!-- <table border="1" cellpadding="6">

<tr>
    <th>User ID</th>
    <th>Age</th>
    <th>Location</th>
    <th>Action</th>
</tr> -->
<div class="all-users-container">

    {% for user in users %}
    <div class="card" style="min-width: 186px; width: 20%; background-color: #202020;">
        <p> <b>User ID :</b>{{ user.user_id }}</p>
        <p><b>Age :</b>{{ user.age }}</p>
        <p><b>Country :</b>{{ user.country }}</p>
        <p>
            <a href="/recommend/{{ user.user_id }}/">
                <button>Recommend</button>
            </a>
        </p>
    </div>
    {% endfor %}
</div>
    
<!-- </table> -->

<br>
<div class="all-users" style="padding: 10px; margin: 10px; margin-top: 0; padding-top:0 ;">
    <button class="all-users-btn">
        <a href="/" style="color: white;">⬅ Back</a>
    </button>
</div>

</body>
</html>
